name: Install pnpm and setup Node.js

runs:
  using: "composite"
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
      with:
        version: 10
    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: "lts/*"
        cache: "pnpm"
